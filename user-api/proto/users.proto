syntax = "proto3";

package users;

message GetGroupedUsersRequest {}

message DepartmentSummary {
  int32 male = 1;
  int32 female = 2;
  string age_range = 3;
  map<string, int32> hair = 4;
  map<string, string> address_user = 5;
}

message GetGroupedUsersResponse {
  map<string, DepartmentSummary> departments = 1;
}

service UserGroupService {
  rpc GetGroupedUsers(GetGroupedUsersRequest) returns (GetGroupedUsersResponse);
}
